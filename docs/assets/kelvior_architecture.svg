<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1850" viewBox="0 0 1200 1850">
  <defs>
    <style>
      .box {
        fill: #eef0ff;
        stroke: #8f84d8;
        stroke-width: 1.5;
        rx: 8;
        ry: 8;
      }
      .subgraph {
        fill: #f2f1cf;
        stroke: #b7b06c;
        stroke-width: 1.5;
        rx: 8;
        ry: 8;
      }
      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        fill: #333;
        text-anchor: middle;
      }
      .small {
        font-size: 15px;
      }
      .subgraph-title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        fill: #333;
        text-anchor: middle;
      }
      .arrow {
        stroke: #4a4a4a;
        stroke-width: 1.8;
        fill: none;
        marker-end: url(#arrowhead);
      }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a4a4a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="1850" fill="#f2f2f2"/>

  <!-- Top row -->
  <rect class="box" x="40" y="40" width="210" height="90"/>
  <text class="label" x="145" y="78">
    <tspan x="145" dy="0">Agent definitions</tspan>
    <tspan x="145" dy="22">YAML reference files</tspan>
  </text>

  <rect class="box" x="300" y="20" width="280" height="130"/>
  <text class="label" x="440" y="58">
    <tspan x="440" dy="0">Governance evidence</tspan>
    <tspan x="440" dy="22">AI policy, data governance policy,</tspan>
    <tspan x="440" dy="22">security policy, approval procedure,</tspan>
    <tspan x="440" dy="22">risk register</tspan>
  </text>

  <rect class="box" x="640" y="40" width="240" height="90"/>
  <text class="label" x="760" y="78">
    <tspan x="760" dy="0">Agent evidence documents</tspan>
    <tspan x="760" dy="22">Retrieval-optimized Markdown</tspan>
  </text>

  <rect class="box" x="930" y="40" width="230" height="90"/>
  <text class="label" x="1045" y="78">
    <tspan x="1045" dy="0">Evidence Source Manifest</tspan>
    <tspan x="1045" dy="22">Canonical document IDs</tspan>
    <tspan x="1045" dy="22">Source traceability</tspan>
  </text>

  <!-- Evidence source set -->
  <rect class="box" x="470" y="210" width="220" height="60"/>
  <text class="label" x="580" y="247">Evidence source set</text>

  <!-- Arrows to source set -->
  <path class="arrow" d="M145 130 C145 180, 240 200, 470 240"/>
  <path class="arrow" d="M440 150 C440 185, 480 200, 540 210"/>
  <path class="arrow" d="M760 130 C760 180, 700 200, 650 240"/>
  <path class="arrow" d="M1045 130 C1045 180, 910 200, 690 240"/>

  <!-- Ingestion -->
  <rect class="box" x="410" y="330" width="340" height="170"/>
  <text class="label" x="580" y="365">
    <tspan x="580" dy="0">Ingestion Security &amp; Ethics Layer</tspan>
    <tspan x="580" dy="22">MVP validation boundary</tspan>
    <tspan x="580" dy="30">Sensitivity label validation</tspan>
    <tspan x="580" dy="22">Allowed data scope validation</tspan>
    <tspan x="580" dy="22">Input sanitization</tspan>
    <tspan x="580" dy="22">Misuse prevention checks</tspan>
  </text>

  <path class="arrow" d="M580 270 L580 330"/>

  <!-- KB -->
  <rect class="box" x="440" y="560" width="280" height="95"/>
  <text class="label" x="580" y="598">
    <tspan x="580" dy="0">Foundry IQ Knowledge Base</tspan>
    <tspan x="580" dy="28">Kelvior governance and agent evidence</tspan>
  </text>

  <path class="arrow" d="M580 500 L580 560"/>

  <!-- Retrieval -->
  <rect class="box" x="420" y="715" width="320" height="110"/>
  <text class="label" x="580" y="750">
    <tspan x="580" dy="0">Evidence retrieval layer</tspan>
    <tspan x="580" dy="24">Grounded Kelvior evidence</tspan>
    <tspan x="580" dy="24">Policy, risk and source metadata</tspan>
  </text>

  <path class="arrow" d="M580 655 L580 715"/>

  <!-- Reasoning agent subgraph -->
  <rect class="subgraph" x="150" y="900" width="900" height="370"/>
  <text class="subgraph-title" x="600" y="935">Microsoft Foundry Reasoning Agent</text>
  <text class="subgraph-title" x="600" y="958">Kelvior Agent Decision Gate</text>

  <!-- AGT_IN -->
  <rect class="box" x="450" y="980" width="260" height="70"/>
  <text class="label" x="580" y="1010">
    <tspan x="580" dy="0">Retrieved evidence enters</tspan>
    <tspan x="580" dy="24">Kelvior Agent Decision Gate</tspan>
  </text>

  <path class="arrow" d="M580 825 L580 980"/>

  <!-- Three internal boxes -->
  <rect class="box" x="190" y="1090" width="220" height="150"/>
  <text class="label small" x="300" y="1125">
    <tspan x="300" dy="0">Five audit domains</tspan>
    <tspan x="300" dy="22">Inventory 15%</tspan>
    <tspan x="300" dy="22">Governance 25%</tspan>
    <tspan x="300" dy="22">Security 25%</tspan>
    <tspan x="300" dy="22">Policy 20%</tspan>
    <tspan x="300" dy="22">Process 15%</tspan>
  </text>

  <rect class="box" x="470" y="1090" width="220" height="150"/>
  <text class="label small" x="580" y="1125">
    <tspan x="580" dy="0">Decision logic</tspan>
    <tspan x="580" dy="22">Mandatory blocking rules</tspan>
    <tspan x="580" dy="22">Weighted readiness score</tspan>
    <tspan x="580" dy="22">Score caps</tspan>
    <tspan x="580" dy="22">Risk assessment</tspan>
  </text>

  <rect class="box" x="750" y="1090" width="220" height="150"/>
  <text class="label small" x="860" y="1125">
    <tspan x="860" dy="0">Evidence traceability</tspan>
    <tspan x="860" dy="22">Section 9 source references</tspan>
    <tspan x="860" dy="22">Manifest-based document IDs</tspan>
  </text>

  <path class="arrow" d="M540 1050 C500 1065, 420 1075, 350 1090"/>
  <path class="arrow" d="M580 1050 L580 1090"/>
  <path class="arrow" d="M620 1050 C680 1065, 760 1075, 860 1090"/>

  <!-- Evidence Pack -->
  <rect class="box" x="430" y="1335" width="300" height="100"/>
  <text class="label" x="580" y="1370">
    <tspan x="580" dy="0">Agent Deployment Evidence Pack</tspan>
    <tspan x="580" dy="30">14 sections</tspan>
  </text>

  <path class="arrow" d="M300 1240 C300 1290, 420 1310, 500 1335"/>
  <path class="arrow" d="M580 1240 L580 1335"/>
  <path class="arrow" d="M860 1240 C860 1290, 740 1310, 660 1335"/>

  <!-- Bottom row -->
  <rect class="box" x="25" y="1495" width="250" height="120"/>
  <text class="label" x="150" y="1530">
    <tspan x="150" dy="0">Deployment readiness verdict</tspan>
    <tspan x="150" dy="28">GO / CONDITIONAL GO /</tspan>
    <tspan x="150" dy="28">REMEDIATE / BLOCK</tspan>
  </text>

  <rect class="box" x="345" y="1530" width="220" height="70"/>
  <text class="label" x="455" y="1570">Required remediation plan</text>

  <rect class="box" x="635" y="1530" width="220" height="70"/>
  <text class="label" x="745" y="1570">Human approval checklist</text>

  <rect class="box" x="925" y="1530" width="220" height="70"/>
  <text class="label" x="1035" y="1570">Re-audit recommendation</text>

  <path class="arrow" d="M500 1435 C430 1470, 300 1485, 150 1495"/>
  <path class="arrow" d="M545 1435 C520 1470, 490 1500, 455 1530"/>
  <path class="arrow" d="M615 1435 C640 1470, 700 1500, 745 1530"/>
  <path class="arrow" d="M660 1435 C760 1470, 900 1490, 1035 1530"/>

  <!-- Final governance review -->
  <rect class="box" x="430" y="1695" width="300" height="105"/>
  <text class="label" x="580" y="1732">
    <tspan x="580" dy="0">Human governance review</tspan>
    <tspan x="580" dy="28">Deployment decision support</tspan>
  </text>

  <path class="arrow" d="M150 1615 C150 1670, 360 1675, 430 1748"/>
  <path class="arrow" d="M455 1600 C455 1650, 500 1670, 540 1695"/>
  <path class="arrow" d="M745 1600 C745 1650, 670 1670, 620 1695"/>
  <path class="arrow" d="M1035 1600 C1035 1670, 820 1675, 730 1748"/>
</svg>
